<!DOCTYPE html>
<html lang="es-GT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo — El Club</title>

  <!-- SEO -->
  <meta name="description" content="Catalogo de camisetas de futbol curadas por El Club. Piezas con historia de La Liga, Premier League, Serie A y mas.">
  <link rel="canonical" href="https://elclub.club/catalogo.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Catalogo — El Club">
  <meta property="og:description" content="Cada pieza tiene historia. Encontra la tuya.">
  <meta property="og:image" content="https://elclub.club/assets/img/brand/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/img/brand/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS v4 Browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Custom Design System -->
  <link rel="stylesheet" href="/assets/css/elclub.css">
</head>
<body class="bg-midnight text-white">

  <!-- ============================================================ -->

    <nav class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex-shrink-0">
        <img src="/assets/img/brand/logo.svg" alt="El Club" class="h-10">
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="/mystery-box.html" class="nav-link">Mystery Box</a>
        <a href="/catalogo.html" class="nav-link active">Catalogo</a>
        <a href="/pedidos.html" class="nav-link">Pedidos</a>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="openCartDrawer()" class="relative text-white hover:text-ice transition-colors cursor-pointer" aria-label="Abrir carrito">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
          </svg>
          <span class="cart-badge hidden">0</span>
        </button>
        <button onclick="toggleMobileMenu()" class="md:hidden text-white hover:text-ice transition-colors cursor-pointer" aria-label="Menu">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="mobile-menu">
    <div class="flex flex-col h-full px-6 py-8">
      <div class="flex justify-end mb-12">
        <button onclick="closeMobileMenu()" class="text-white hover:text-ice transition-colors cursor-pointer" aria-label="Cerrar">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <nav class="flex flex-col gap-8">
        <a href="/mystery-box.html" onclick="closeMobileMenu()" class="text-2xl">Mystery Box</a>
        <a href="/catalogo.html" onclick="closeMobileMenu()" class="text-2xl text-ice">Catalogo</a>
        <a href="/pedidos.html" onclick="closeMobileMenu()" class="text-2xl">Pedidos</a>
      </nav>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- PAGE HEADER                                                  -->
  <!-- ============================================================ -->
  <main class="pt-16">
    <section class="px-4 pt-12 pb-6 md:pt-16 md:pb-8">
      <div class="max-w-6xl mx-auto">

        <div class="mb-8">
          <h1 class="font-display text-5xl md:text-6xl lg:text-7xl text-white mb-3">Catalogo</h1>
          <p class="text-smoke text-base md:text-lg">Cada pieza tiene historia. Encontra la tuya.</p>
          <p id="piece-count" class="text-ice text-sm font-semibold mt-2 uppercase tracking-wider"></p>
        </div>

        <!-- ── Filters ── -->
        <div class="flex flex-col gap-3">

          <!-- League pills + Search -->
          <div class="flex items-center gap-3">
            <div id="league-pills" class="flex gap-2 overflow-x-auto pb-1 flex-1 no-scrollbar">
              <!-- Populated by JS -->
            </div>

            <!-- Search toggle -->
            <div id="search-container" class="search-expand flex items-center bg-pitch border border-chalk rounded-full">
              <button onclick="toggleSearch()" class="w-10 h-10 flex items-center justify-center flex-shrink-0 text-smoke hover:text-ice transition-colors cursor-pointer" aria-label="Buscar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                </svg>
              </button>
              <input id="catalog-search" type="text" placeholder="Buscar equipo, liga..." class="bg-transparent border-none outline-none text-sm text-white pr-4 h-10 w-full" oninput="setSearchFilter(this.value)">
            </div>
          </div>

          <!-- Size pills -->
          <div id="size-pills" class="flex gap-2">
            <!-- Populated by JS -->
          </div>

        </div>

      </div>
    </section>

    <!-- ============================================================ -->
    <!-- PRODUCT GRID (asymmetric)                                    -->
    <!-- ============================================================ -->
    <section class="px-4 pb-20">
      <div class="max-w-6xl mx-auto">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================================ -->
  <!-- FOOTER (compact)                                             -->
  <!-- ============================================================ -->

      <a href="/" class="flex-shrink-0">
        <img src="/assets/img/brand/logo.svg" alt="El Club" class="h-8">
      </a>
      <div class="flex items-center gap-4">
        <a href="https://www.instagram.com/club.gt" target="_blank" rel="noopener" class="text-smoke hover:text-ice transition-colors" aria-label="Instagram">

          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.46V13a8.28 8.28 0 005.58 2.15V11.7a4.83 4.83 0 01-3.77-1.24V6.69h3.77z"/></svg>
        </a>
      </div>
      <p class="text-ash text-xs">El Club 2026</p>
    </div>
  </footer>

  <!-- ============================================================ -->
  <!-- CART OVERLAY + DRAWER                                        -->
  <!-- ============================================================ -->
  <div id="cart-overlay" class="cart-overlay" onclick="closeCartDrawer()"></div>
  <div id="cart-drawer" class="cart-drawer">
    <div class="flex items-center justify-between px-5 py-4 border-b border-chalk">
      <h2 class="font-bold text-lg uppercase tracking-wider">Tu carrito</h2>
      <button onclick="closeCartDrawer()" class="text-ash hover:text-white transition-colors cursor-pointer" aria-label="Cerrar carrito">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="cart-empty" class="flex-1 flex flex-col items-center justify-center px-5 text-center">
      <svg class="w-16 h-16 text-chalk mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>

      <p class="text-smoke font-semibold mb-1">Tu carrito esta vacio</p>
      <p class="text-ash text-sm mb-6">Agrega algo increible para empezar.</p>
    </div>
    <div id="cart-filled" class="hidden flex-1 flex flex-col">
      <div id="cart-items" class="flex-1 overflow-y-auto px-5"></div>
      <div class="border-t border-chalk px-5 py-4">
        <div class="flex items-center justify-between mb-4">
          <span class="font-bold text-sm uppercase tracking-wider">Total</span>
          <span id="cart-total" class="font-extrabold text-xl text-ice">Q0</span>
        </div>
        <a href="/pedidos.html" onclick="closeCartDrawer()" class="btn-primary w-full text-center text-sm py-3.5 block">Ir a pedidos</a>
        <button onclick="closeCartDrawer()" class="btn-ghost w-full text-sm py-2 mt-2 cursor-pointer">Seguir comprando</button>
      </div>
    </div>
  </div>

  <!-- WhatsApp Float -->

  <!-- SCRIPTS                                                      -->
  <!-- ============================================================ -->
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadProducts(function(products) {
        initPillFilters(products);
        applyFilters();
      });
    });
  </script>

  <!-- Hide scrollbar on pill containers -->
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
